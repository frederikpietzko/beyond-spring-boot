# Default values for apps.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: frederikpietzko/spring-boot
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: { }
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: { }
podLabels:
  app.kubernetes.io/metrics: "true"

podSecurityContext: { }
# fsGroup: 2000

securityContext: { }
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

resources:
  # We want 2 CPU and 4-6GB memory as specified
  limits:
    cpu: "2"
    memory: 6Gi
  requests:
    cpu: "2"
    memory: 4Gi

jvm:
  # JAVA_TOOL_OPTIONS is used for JVM settings
  # Default heap 4GB as requested
  javaToolOptions: "-Xmx4g"

database:
  secretName: pg-credentials
  jdbcUrlKey: JDBC_URL
  usernameKey: DB_USERNAME
  passwordKey: DB_PASSWORD

nodeSelector:
  pool: apps

tolerations: [ ]

affinity: { }
