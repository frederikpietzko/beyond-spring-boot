name: Build and Push Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - spring-boot
          - spring-boot-jdbc
          - quarkus
          - quarkus-jdbi
          - micronaut
          - micronaut-jdbc
          - ktor
          - helidon-mp
          - helidon-se
          - javalin
          - http4k
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set GIT_SHORT_HASH
        run: echo "GIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and Push Spring Boot Image
        if: matrix.module == 'spring-boot' || matrix.module == 'spring-boot-jdbc'
        run: ./gradlew :${{ matrix.module }}:bootBuildImage --publishImage

      - name: Build and Push Quarkus Image
        if: matrix.module == 'quarkus' || matrix.module == 'quarkus-jdbi'
        run: |
          ./gradlew :${{ matrix.module }}:build -x test \
            -Dquarkus.hibernate-orm.database.generation=none \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.group=frederikpietzko \
            -Dquarkus.container-image.name=${{ matrix.module }} \
            -Dquarkus.container-image.tag=${{ env.GIT_SHORT_HASH }}

      - name: Build and Push Micronaut Image
        if: matrix.module == 'micronaut' || matrix.module == 'micronaut-jdbc'
        run: |
          ./gradlew :${{ matrix.module }}:dockerPush -x test \
            -Dmicronaut.docker.imageName=frederikpietzko/${{ matrix.module }}:${{ env.GIT_SHORT_HASH }}

      - name: Build and Push Dockerfile-based Image
        if: >
          matrix.module == 'ktor' ||
          matrix.module == 'helidon-mp' ||
          matrix.module == 'helidon-se' ||
          matrix.module == 'javalin' ||
          matrix.module == 'http4k'
        run: |
          ./gradlew :${{ matrix.module }}:assemble
          docker build -t frederikpietzko/${{ matrix.module }}:${{ env.GIT_SHORT_HASH }} ./${{ matrix.module }}
          docker push frederikpietzko/${{ matrix.module }}:${{ env.GIT_SHORT_HASH }}
